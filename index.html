<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Interactive rating component</title>

  <link rel="stylesheet" type="text/css" href="styles.css">

  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Overpass:wght@400;700&display=swap" rel="stylesheet">

</head>
<body>

  <!-- Rating state start -->
  <div class="firstStateContainer">

    <img src="images/icon-star.svg">
    <h2>How did we do?</h2>
    <p>Please let us know how we did with your support request. All feedback is appreciated to help us improve our offering!</p>
    <ul class="ratingNumbersContainer">
      <li class="ratingNumber">1</li>
      <li class="ratingNumber">2</li>
      <li class="ratingNumber">3</li>
      <li class="ratingNumber">4</li>
      <li class="ratingNumber">5</li>
    </ul>
    <button>Submit</button>

  </div>
    
  <!-- Rating state end -->

  <!-- Thank you state start 

  You selected Add rating here  out of 5

  Thank you!

  We appreciate you taking the time to give a rating. If you ever need more support, 
  don’t hesitate to get in touch!

  Thank you state end -->

</body>
</html>
